name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build Android JS bundle
        run: |
          mkdir -p build
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output build/index.android.bundle \
            --assets-dest build
